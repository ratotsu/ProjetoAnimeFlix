# Configuração do Alembic para migrações de banco de dados
# Uso: alembic init migrations

[alembic]
# Localização dos scripts de migração
script_location = migrations

# Template para mensagens de revisão
file_template = %%(year)d_%%(month).2d_%%(hour).2d_%%(minute).2d_%%(rev)s_%%(savelocalidade)s

# Timezone para os timestamps
timezone = UTC

# Comprimento máximo do slug
truncate_slug_length = 40

# Executar os processos de migração
revision_environment = false

# Suffixo para os arquivos de migração
source_file_ext = py

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S